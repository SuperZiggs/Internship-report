name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.134.3
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Hugo
        run: |
          set -euo pipefail
          curl -fsSL -o hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf hugo.tar.gz hugo
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Build with Hugo
        run: hugo --gc --minify

      - name: Deploy to gh-pages branch
        run: |
          set -euo pipefail
          if [ -z "$(ls -A public)" ]; then
            echo "Build output is empty."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || true
          rm -rf .gh-pages
          git worktree add -B gh-pages .gh-pages origin/gh-pages || git worktree add -B gh-pages .gh-pages

          find .gh-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a public/. .gh-pages/
          touch .gh-pages/.nojekyll

          cd .gh-pages
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Deploy from ${GITHUB_SHA}"
            git push origin gh-pages --force
          else
            echo "No changes to deploy."
          fi
